<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주니어통번역사 교재 생성기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        :root {
            --primary-blue: #1e40af;
            --accent-purple: #7c3aed;
            --accent-red: #dc2626;
            --accent-green: #059669;
            --gray-900: #111827;
            --gray-700: #374151;
            --gray-500: #6b7280;
            --gray-200: #e5e7eb;
            --gray-100: #f0f2f5;
            --print-margin: 10mm;
        }

        body {
            font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
            background-color: #f0f2f5;
            color: var(--gray-900);
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.02em;
        }

        /* -------------------------------------
           UI Components (Web View)
        -------------------------------------- */
        .sidebar {
            width: 320px;
            background: #ffffff;
            border-right: 1px solid var(--gray-200);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            z-index: 50;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 3rem 2rem;
            background-color: #f0f2f5;
            scroll-behavior: smooth;
        }

        .neumo-btn {
            background: #ffffff;
            border: 1px solid var(--gray-200);
            border-radius: 10px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .neumo-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: var(--primary-blue);
        }

        .neumo-btn.active {
            background: var(--primary-blue);
            color: white !important;
            border-color: var(--primary-blue);
        }

        /* -------------------------------------
           Professional A4 Page Construction
        -------------------------------------- */
        .a4-page {
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto 30mm auto;
            background: white;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            padding: var(--print-margin);
            position: relative;
            box-sizing: border-box;
            color: black;
            font-size: 9.5pt;
            line-height: 1.4;
        }

        /* Essential Typography */
        .en-font { font-family: 'Pretendard', sans-serif; letter-spacing: -0.02em; }
        .ko-font { font-family: 'Noto Sans KR', sans-serif; letter-spacing: -0.03em; }

        /* Section Titles - Publisher Style */
        .section-header {
            display: flex;
            align-items: center;
            border-bottom: 2px solid var(--gray-900);
            padding-bottom: 4px;
            margin-bottom: 12px;
            margin-top: 20px;
        }

        .section-number {
            background: var(--gray-900);
            color: white;
            padding: 3px 10px;
            font-weight: 900;
            font-size: 11pt;
            margin-right: 10px;
            border-radius: 3px;
        }

        .section-title-text {
            font-size: 12pt;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -0.02em;
        }

        /* Professional Header */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--gray-200);
            padding-bottom: 8px;
        }

        .logo-box { display: flex; align-items: center; gap: 10px; }
        .info-box { text-align: right; font-size: 8pt; color: var(--gray-700); }
        .info-box strong { font-size: 9.5pt; color: black; display: block; margin-bottom: 2px; }

        /* Writing Lines - Precise Dotted/Solid */
        .writing-line {
            min-height: 28px;
            margin-top: 2px;
            position: relative;
            display: flex;
            align-items: flex-end;
            padding-bottom: 2px;
            padding-left: 2px;
        }

        .writing-line::after {
            content: '';
            position: absolute;
            left: 0; bottom: -2px;
            width: 100%; height: 1px;
            border-bottom: 1px dashed var(--gray-200);
        }

        /* Crossword / Table Refinement */
        table { border-collapse: collapse; border: 2px solid var(--gray-900); }
        th, td { border: 1px solid var(--gray-900); }

        /* -------------------------------------
           Strict Print Controls
        -------------------------------------- */
        @media print {
            @page {
                size: A4;
                margin: 15mm 10mm; /* 페이지 자체에 확실한 상하좌우 여백 부여 */
            }

            body {
                background: white;
                height: auto;
                overflow: visible !important;
                display: block;
            }

            .sidebar, .view-tabs, .session-tabs {
                display: none !important;
            }

            .main-content {
                padding: 0 !important;
                margin: 0 !important;
                background: white !important;
                overflow: visible !important;
                height: auto !important;
            }

            .a4-page {
                width: 100% !important;
                height: auto !important;
                min-height: auto !important;
                margin: 0 !important;
                padding: 0 !important; /* @page margin으로 위임 */
                box-shadow: none !important;
                page-break-after: always !important;
                page-break-inside: auto !important;
                position: relative;
                overflow: visible !important;
            }

            .print-page-break {
                page-break-before: always !important;
            }

            /* Typography Scaling for Print */
            h1 { font-size: 16pt !important; line-height: 1.1; }
            h2 { font-size: 13pt !important; line-height: 1.2; }
            p, div, span { font-size: 9.5pt !important; line-height: 1.4; }
            
            .text-red-600 { color: #dc2626 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .bg-blue-50 { background-color: #eff6ff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .bg-yellow-50 { background-color: #fefce8 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }

            /* Fixes overlapping elements inside flex/grid during print */
            .avoid-break {
                page-break-inside: avoid !important;
                break-inside: avoid-page !important;
                -webkit-column-break-inside: avoid !important;
                display: inline-block !important; /* Inline-block is the most reliable way to force Chrome to respect break-inside */
                width: 100% !important;
            }
        }

        /* Specific Component Styles */
        .word-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15mm;
        }

        .word-entry {
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid var(--gray-200);
            padding-bottom: 10px;
        }

        .word-entry-en { font-size: 18pt; font-weight: 900; color: var(--primary-blue); margin-bottom: 2px; }
        .word-entry-ko { font-size: 14pt; font-weight: 500; color: var(--gray-700); }

        .roleplay-box {
            padding: 20px;
            background-color: var(--gray-100);
            border-radius: 8px;
            border: 1px solid var(--gray-200);
        }
    </style>
</head>

<body>

    <!-- Sidebar (Neumorphism Design) -->
    <div class="sidebar no-print">
        <div class="p-5 pb-2 pt-6">
            <h1 class="text-xl font-black flex items-center gap-2 text-gray-800">
                <i class="fas fa-layer-group text-blue-500"></i> 주니어통번역사
            </h1>
            <p class="text-[11px] text-gray-500 mt-2 mb-4">출력할 테마를 선택하세요.</p>

            <!-- Print Button (Moved to Sidebar) -->
            <button onclick="window.print()"
                class="w-full neumo-btn font-bold py-2 px-4 flex items-center justify-center gap-2 text-sm text-blue-600 mb-2 cursor-pointer">
                <i class="fas fa-print"></i> 현재 페이지 인쇄
            </button>

            <!-- Chapter All Print Button -->
            <button onclick="printChapterAll()"
                class="w-full neumo-btn font-bold py-2 px-4 flex items-center justify-center gap-2 text-sm text-green-600 mb-1 cursor-pointer">
                <i class="fas fa-file-pdf"></i> 전체 차시 인쇄 (1~3차시)
            </button>
        </div>

        <div id="menu-container" class="flex-1 pb-2">
            <!-- Menu items generated by JS -->
        </div>

        <div class="mt-auto">
            <!-- Logo Upload Section -->
            <div class="neumo-panel">
                <h3 class="text-[13px] font-bold text-gray-700 mb-1"><i class="fas fa-image mr-2 text-blue-400"></i>학원
                    로고 설정</h3>
                <p class="text-[9px] text-gray-500 mb-2.5 leading-tight">로고 이미지를 업로드하면 교재 상단에 적용됩니다.</p>
                <input type="file" id="logo-upload" accept="image/*" class="hidden">
                <label for="logo-upload"
                    class="block w-full text-center neumo-btn text-xs font-bold py-2 px-4 cursor-pointer text-gray-600">
                    로고 이미지 선택
                </label>
            </div>

            <!-- CSV Upload Section -->
            <div class="neumo-panel mb-4 mt-0">
                <h3 class="text-[13px] font-bold text-gray-700 mb-1"><i
                        class="fas fa-file-csv mr-2 text-green-500"></i>데이터 불러오기</h3>
                <p class="text-[9px] text-gray-500 mb-2.5 leading-tight">CSV 파일을 업로드하면 단어가 자동 적용됩니다.</p>
                <input type="file" id="csv-upload" accept=".csv" class="hidden">
                <label for="csv-upload"
                    class="block w-full text-center neumo-btn text-xs font-bold py-2 px-4 cursor-pointer text-gray-600">
                    CSV 파일 선택
                </label>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content relative">
        <!-- View Tabs (Neumorphism Design) -->
        <div class="view-tabs flex flex-wrap justify-center gap-4 mb-8 w-full max-w-[210mm] mx-auto z-10 relative">
            <button id="tab-textbook" onclick="changeView('textbook')"
                class="flex-1 py-3 px-2 font-bold text-sm neumo-btn text-gray-600 cursor-pointer">
                <i class="fas fa-book mr-1"></i>교재
            </button>
            <button id="tab-vocalist" onclick="changeView('vocalist')"
                class="flex-1 py-3 px-2 font-bold text-sm neumo-btn text-gray-600 cursor-pointer">
                <i class="fas fa-list-ul mr-1"></i>단어/문장
            </button>
            <button id="tab-hw1" onclick="changeView('hw1')"
                class="flex-1 py-3 px-2 font-bold text-sm neumo-btn text-gray-600 cursor-pointer">
                <i class="fas fa-pen-to-square mr-1"></i>1차 숙제
            </button>
            <button id="tab-hw2" onclick="changeView('hw2')"
                class="flex-1 py-3 px-2 font-bold text-sm neumo-btn text-gray-600 cursor-pointer">
                <i class="fas fa-puzzle-piece mr-1"></i>2차 숙제
            </button>
            <button id="tab-hw3" onclick="changeView('hw3')"
                class="flex-1 py-3 px-2 font-bold text-sm neumo-btn text-gray-600 cursor-pointer">
                <i class="fas fa-spell-check mr-1"></i>3차 숙제
            </button>
            <!-- 답지 인쇄 토글 버튼 -->
            <button id="tab-answer" onclick="toggleAnswer()"
                class="w-24 py-3 px-2 font-bold text-sm neumo-btn neumo-btn-answer text-red-500 hidden cursor-pointer">
                <i class="fas fa-check-circle mr-1"></i>답지
            </button>
        </div>

        <!-- Session Selection Tabs (Add this) -->
        <div class="session-tabs flex justify-center gap-6 mb-8 w-full max-w-[210mm] mx-auto z-10 relative">
            <button id="sess-1" onclick="changeSession(1)"
                class="w-32 py-2 px-4 font-bold text-sm neumo-btn active cursor-pointer">
                <i class="fas fa-calendar-day mr-1"></i>1차시
            </button>
            <button id="sess-2" onclick="changeSession(2)"
                class="w-32 py-2 px-4 font-bold text-sm neumo-btn text-gray-500 cursor-pointer">
                <i class="fas fa-calendar-day mr-1"></i>2차시
            </button>
            <button id="sess-3" onclick="changeSession(3)"
                class="w-32 py-2 px-4 font-bold text-sm neumo-btn text-gray-500 cursor-pointer">
                <i class="fas fa-calendar-day mr-1"></i>3차시
            </button>
        </div>

        <div id="page-container" class="a4-page">
            <!-- Content generated by JS -->
        </div>
    </div>

    <script>
        // 데이터 압축 헬퍼 (로딩 최적화 및 에러 방지)
        function expW(arr) { return arr.map(w => ({ en: w[0], ko: w[1], def: w[2], senEn: w[3], senKo: w[4] })); }

        // Database - 고도로 압축된 포맷
        const db = [
            {
                id: 1, title: "Home", subtitle: "집 안의 공간, 가구 등과 관련된 단어를 배웁니다.", icon: "fa-house",
                data: "air conditioner|에어컨|a machine that cools the air|Turn on the air conditioner.|에어컨을 켜세요.^attic|다락(방)|a space just below the roof|Anne lived in the attic of the house.|앤은 그 집 다락방에 살았어요.^aunt|이모, 고모|the sister of your father or mother|My aunt lives in Busan.|우리 이모는 부산에 살고 계세요.^basement|지하층|a room below ground level|We have a large basement.|우리집에는 큰 지하실이 있어요.^bathroom|욕실, 화장실|a room with a toilet and shower|Where is the bathroom?|화장실이 어디예요?^bed|침대|a piece of furniture for sleeping|A pillow is on the bed.|침대 위에 베개가 있어요.^bedroom|침실, 방|a room for sleeping|My bedroom is too small.|내 방은 아주 작아요.^blanket|담요|a warm cover for a bed|The blanket is made of wool.|그 담요는 양모로 만들어졌어요.^bowl|그릇|a round deep dish for food|The bowl is full of milk.|그릇에 우유가 가득 담겨있네요.^brother|형제|a male sibling|I have two brothers.|나는 남자 형제가 두명 있어요.^chair|의자|a seat with a back and four legs|I like the yellow chair.|나는 노란 의자를 좋아해요.^closet|옷장|a small room for storing clothes|I put my clothes in the small closet.|내 옷을 작은 옷장에 두었어요.^computer|컴퓨터|a machine used for storing data|What do you usually do with your computer?|당신은 컴퓨터로 주로 무슨 일을 하나요?^cook|요리하다|to prepare food for eating|My brother cooks very well.|우리 오빠는 요리를 아주 잘 해요.^desk|책상|a table for studying or working|He is sitting at the desk.|그는 책상에 앉아 있어요.^dining room|식당|a room for eating meals|We had dinner in the dining room.|우리는 식당에서 저녁을 먹었어요.^door|문|a barrier to close an opening|Close the door, please.|문을 닫으세요.^fan|선풍기|a machine that creates a breeze|Turn on the fan.|선풍기를 켜세요.^floor|바닥|the surface you walk on|A baby is playing on the floor.|아기가 바닥에서 놀고 있어요.^garage|차고, 창고|a building for parking cars|He parked his car in the garage.|그는 차고에 차를 주차했어요.^garbage|쓰레기|waste material or trash|A boy threw some trash in the garbage can.|소년이 쓰레기통에 쓰레기를 버렸어요.^grandfather|할아버지|the father of your parent|My grandfather wants to live with me.|우리 할아버지는 나와 함께 살고 싶어하세요.^grandmother|할머니|the mother of your parent|My grandmother is in her sixties.|우리 할머니는 60대입니다.^grandparents|조부모님|the parents of your parents|I live with my grandparents.|나는 조부모님과 살고 있어요.^kitchen|부엌, 주방|a room where food is cooked|A man is in the kitchen.|한 남자가 주방에 있어요.^living room|거실|a room for relaxing with family|Let's watch TV in the living room.|거실에서 TV를 보자.^mobile phone|휴대폰|a portable wireless phone|Children don't need a mobile phone.|어린이는 휴대폰이 필요하지 않아요.^parents|부모님|one's father or mother|I really love my parents.|나는 부모님을 정말 사랑해요.^pillow|베개|a soft cushion for your head|I like a soft pillow.|나는 부드러운 베개를 좋아해요.^porch light|현관등|a light outside the front door|Turn on the porch light at 7 o'clock.|7시에 현관등을 켜세요.^refrigerator|냉장고|a machine that keeps food cold|We need a refrigerator in the summer.|여름에는 냉장고가 필요합니다.^roof|지붕|the top covering of a building|The house has a red roof.|그 집은 빨간 지붕이에요.^room|방|a divided part of a house|There are two rooms.|두개의 방이 있어요.^sink|싱크대|a basin used for washing|I wash the dishes in the sink.|나는 싱크대에서 설거지를 합니다.^sister|여자형제|a female sibling|She is my little sister.|그녀는 내 여동생이에요.^sofa|소파|a long comfortable seat|Don't jump on the sofa.|소파 위에서 뛰지 마세요.^stairs|계단|a set of steps between floors|Don't run down the stairs.|계단에서 뛰어 내려가지 마라.^table|테이블|furniture with a flat top and legs|There is an apple on the table.|테이블 위에 사과가 있어요.^telephone|전화기|a device to talk to far people|Your telephone is ringing.|당신 전화벨이 울리고 있어요.^television|텔레비전|a device for watching broadcasts|Watch television after you finish your homework.|숙제 끝내고 텔레비전을 봐라.^toilet|화장실(변기)|a bowl to get rid of body waste|Where is the toilet?|화장실이 어디입니까?^window|창문|an opening covered with glass|Open the window, please.|창문을 열어주세요."
            },
            {

                    { speaker: "B", text: "She needs a [pillow] while watching [television] all night.", ko: "밤새 TV를 보느라 베개가 필요하겠네." },
                    { speaker: "A", text: "Is there any cold water in the [refrigerator]?", ko: "냉장고에 시원한 물 좀 있니?" },
                    { speaker: "B", text: "Yes, it's on the [table] next to the [sink].", ko: "응, 싱크대 옆 식탁 위에 있어." },
                    { speaker: "A", text: "I need to clean the [toilet] in the other [room].", ko: "나는 다른 방에 있는 변기를 청소해야 해." },
                    { speaker: "B", text: "Wait, the [telephone] is ringing near the [window].", ko: "잠깐만, 창문 근처에서 전화기가 울리고 있어." },
                    { speaker: "A", text: "I'll go down the [stairs] and turn on the [porch light].", ko: "계단으로 내려가서 현관등을 켤게." },
                    { speaker: "B", text: "Be careful not to trip. Look at the [roof] outside!", ko: "넘어지지 않게 조심해. 밖의 지붕을 좀 봐!" }
                ]
            },
            2: {
                intro: "주어진 뜻과 문맥을 보고, 빈칸에 알맞은 영어 단어를 적어 21줄의 대화문을 완성하세요.",
                dialogue: [
                    { speaker: "A", text: "We have an [annual] party every [June] or [July].", ko: "우리는 매년 6월이나 7월에 연례 파티를 열어." },
                    { speaker: "B", text: "My [clock] says it is already [Friday] [afternoon].", ko: "내 시계를 보니 벌써 금요일 오후야." },
                    { speaker: "A", text: "I started planning this a [decade] ago in [January].", ko: "나는 이걸 10년 전인 1월부터 계획하기 시작했어." },
                    { speaker: "B", text: "We can meet in [February] or early [April] for an [hour].", ko: "우리는 2월이나 4월 초에 한 시간 동안 만날 수 있어." },
                    { speaker: "A", text: "The [evening] festival in [August] was great.", ko: "8월에 열린 저녁 축제는 정말 멋졌어." },
                    { speaker: "B", text: "Wait, wasn't it in [December] instead?", ko: "잠깐만, 그게 대신 12월 아니었어?" },
                    { speaker: "A", text: "I need to check the exact [date] of the event.", ko: "행사의 정확한 날짜를 확인해봐야겠어." },
                    { speaker: "A", text: "It's [Monday] [morning] and the new [month] starts soon.", ko: "월요일 아침이고 새로운 달이 곧 시작돼." },
                    { speaker: "B", text: "We should meet at [noon] once in [March] or [May].", ko: "우리는 3월이나 5월 중에 정오에 한 번 만나야 해." },
                    { speaker: "A", text: "I stayed there [overnight] [once] last [October].", ko: "나는 지난 10월에 그곳에 하룻밤 동안 한 번 머물렀어." },
                    { speaker: "B", text: "It was a cold [night] in [November], right?", ko: "그건 11월의 어느 추운 밤이었지, 맞지?" },
                    { speaker: "A", text: "Yes, I woke up at [midnight] and waited for a [quarter].", ko: "응, 자정에 깨어나서 15분(4분의 1시간) 동안 기다렸어." },
                    { speaker: "B", text: "Give me a [minute] to check the calendar.", ko: "달력을 확인할 시간을 잠깐(1분만) 줘." },
                    { speaker: "A", text: "Time is running out, please hurry up.", ko: "시간이 없으니 서둘러 줘." },
                    { speaker: "A", text: "Check your [schedule] for the upcoming [week].", ko: "다가오는 주를 위한 너의 일정을 확인해 봐." },
                    { speaker: "B", text: "[Today] is [Tuesday] and [tomorrow] is [Wednesday].", ko: "오늘은 화요일이고 내일은 수요일이야." },
                    { speaker: "A", text: "We can spend the [weekend] on [Saturday] and [Sunday].", ko: "우리는 토요일과 일요일 주말을 보낼 수 있어." },
                    { speaker: "B", text: "I have some [time] on [Thursday] or next [year].", ko: "목요일이나 내년에 시간이 좀 있어." },
                    { speaker: "A", text: "Is your [watch] broken since last [September]?", ko: "너의 손목시계가 지난 9월부터 고장 난 거니?" },
                    { speaker: "B", text: "Yes, it stopped moving on that rainy day.", ko: "응, 비 오던 그날에 움직임을 멈췄어." },
                    { speaker: "A", text: "I hope we can fix it before the next meeting.", ko: "다음 모임 전에는 고칠 수 있으면 좋겠다." }
                ]
            },
            3: {
                intro: "주어진 뜻과 문맥을 보고, 빈칸에 알맞은 영어 단어를 적어 21줄의 대화문을 완성하세요.",
                dialogue: [
                    { speaker: "A", text: "In [autumn], a gentle [breeze] can turn [chilly].", ko: "가을에는 산들바람이 쌀쌀하게 변할 수 있어." },
                    { speaker: "B", text: "A sudden [earthquake] can cause a dangerous [flood].", ko: "갑작스러운 지진은 위험한 홍수를 일으킬 수 있지." },
                    { speaker: "A", text: "The [blizzard] outside will [freeze] everything tonight.", ko: "밖의 눈보라가 오늘 밤 모든 것을 얼려버릴 거야." },
                    { speaker: "B", text: "There is [frost] and [dew] on the grass near the [fog].", ko: "안개 낀 잔디 근처에는 서리와 이슬이 맺혀 있어." },
                    { speaker: "A", text: "The [desert] suffers from a long [drought] and [dust].", ko: "사막은 오랜 가뭄과 먼지로 고통받고 있어." },
                    { speaker: "B", text: "Look at that dark [cloud] in the sky.", ko: "하늘에 저 어두운 구름 좀 봐." },
                    { speaker: "A", text: "It looks like a storm is coming.", ko: "폭풍이 올 것 같아 보여." },
                    { speaker: "A", text: "The [hurricane] over the [ocean] brought heavy [rain].", ko: "대양 너머의 허리케인이 폭우를 몰고 왔어." },
                    { speaker: "B", text: "In [spring], we [sow] seeds after the [snow] melts.", ko: "봄에는 눈이 녹은 뒤에 씨를 뿌리지." },
                    { speaker: "A", text: "The [monsoon] [season] makes the air very [muggy].", ko: "장마철에는 공기가 매우 후덥지근해져." },
                    { speaker: "B", text: "I saw [lightning] through the thick [mist] in the [rainforest].", ko: "나는 열대우림의 짙은 안개 속에서 번개를 봤어." },
                    { speaker: "A", text: "Is that an [iceberg] made of solid [ice]?", ko: "저건 단단한 얼음으로 만들어진 빙산이니?" },
                    { speaker: "B", text: "Yes, it's floating on the cold water.", ko: "응, 차가운 물 위에 떠 있네." },
                    { speaker: "A", text: "The view is absolutely stunning.", ko: "경치가 정말 멋지다." },
                    { speaker: "A", text: "The [weather] will be [sunny] and [warm] this [summer].", ko: "이번 여름 날씨는 화창하고 따뜻할 거야." },
                    { speaker: "B", text: "Check the [thermometer] as the [temperature] rises under the [sun].", ko: "태양 아래서 기온이 올라가니까 온도계를 확인해 봐." },
                    { speaker: "A", text: "A big [storm] with [thunder] and [wind] is coming.", ko: "천둥과 바람을 동반한 큰 폭풍이 오고 있어." },
                    { speaker: "B", text: "Don't forget your [umbrella] or you will get [wet].", ko: "우산을 잊지 마, 아니면 다 젖을 거야." },
                    { speaker: "A", text: "A violent [tornado] or a [typhoon] can be scary.", ko: "격렬한 토네이도나 태풍은 무서울 수 있어." },
                    { speaker: "B", text: "Nature has so much power.", ko: "자연은 정말 큰 힘을 가지고 있어." },
                    { speaker: "A", text: "We must always be prepared.", ko: "우리는 항상 대비하고 있어야 해." }
                ]
            },
            4: {
                intro: "주어진 뜻과 문맥을 보고, 빈칸에 알맞은 영어 단어를 적어 21줄의 대화문을 완성하세요.",
                dialogue: [
                    { speaker: "A", text: "An [actor] and an [artist] met a brave [astronaut].", ko: "어느 배우와 화가가 용감한 우주비행사를 만났어." },
                    { speaker: "B", text: "The [baker] and the [barista] served the [athlete].", ko: "제빵사와 바리스타가 그 운동선수에게 음식을 대접했지." },
                    { speaker: "A", text: "The [author] talked to a famous [broadcaster] and a [businessman].", ko: "작가는 유명한 방송인과 사업가에게 말을 걸었어." },
                    { speaker: "B", text: "A [cartoonist] and a [chef] are working together.", ko: "만화가와 주방장이 함께 일하고 있어." },
                    { speaker: "A", text: "The [cashier] and the [clerk] told the [cook] to hurry.", ko: "계산원과 점원이 요리사에게 서두르라고 말했어." },
                    { speaker: "B", text: "Everyone is doing their job well.", ko: "모두가 자기 일을 잘하고 있구나." },
                    { speaker: "A", text: "It's a busy day for everyone.", ko: "모두에게 바쁜 하루네." },
                    { speaker: "A", text: "The [dentist] and the [doctor] saw a [firefighter].", ko: "치과의사와 의사가 소방관을 봤어." },
                    { speaker: "B", text: "A [designer] and an [engineer] are talking to the [driver].", ko: "디자이너와 엔지니어가 운전기사와 이야기하고 있어." },
                    { speaker: "A", text: "The [detective] asked the [guard] and the [farmer] some questions.", ko: "형사가 경비원과 농부에게 몇 가지 질문을 했어." },
                    { speaker: "B", text: "A [florist] and a [hairdresser] visited the [librarian].", ko: "꽃집 주인과 미용사가 사서를 방문했지." },
                    { speaker: "A", text: "The [judge] listened to the [lawyer] in court.", ko: "판사는 법정에서 변호사의 말을 들었어." },
                    { speaker: "B", text: "The court trial was very serious.", ko: "법정 재판은 매우 진지했어." },
                    { speaker: "A", text: "Justice must be served.", ko: "정의가 이루어져야 해." },
                    { speaker: "A", text: "A [magician] and a [film director] watched the [musician] perform.", ko: "마술사와 영화 감독이 음악가의 연주를 지켜봤어." },
                    { speaker: "B", text: "The [novelist] and the [photographer] interviewed the [singer].", ko: "소설가와 사진작가는 그 가수를 인터뷰했지." },
                    { speaker: "A", text: "A [mail carrier] delivered a package to the [nurse] and the [pharmacist].", ko: "우편배달부가 간호사와 약사에게 소포를 배달했어." },
                    { speaker: "B", text: "The [pilot] and the [police officer] spoke with the [programmer].", ko: "조종사와 경찰관이 프로그래머와 대화했어." },
                    { speaker: "A", text: "The [reporter] and the [scientist] studied the results.", ko: "기자와 과학자가 그 결과들을 연구했지." },
                    { speaker: "B", text: "They found something very interesting.", ko: "그들은 무척 흥미로운 점을 발견했어." },
                    { speaker: "A", text: "It could change everything.", ko: "그게 모든 것을 바꿀 수도 있어." }
                ]
            },
            5: {
                intro: "주어진 뜻과 문맥을 보고, 빈칸에 알맞은 영어 단어를 적어 21줄의 대화문을 완성하세요.",
                dialogue: [
                    { speaker: "A", text: "I'll go to the [bank] and then meet you at the [bus stop].", ko: "나는 은행에 갔다가 버스 정류장에서 너를 만날게." },
                    { speaker: "B", text: "Let's visit the [campus] and the grand [city hall].", ko: "캠퍼스와 웅장한 시청을 방문해 보자." },
                    { speaker: "A", text: "We can buy books at the [bookstore] and bread at the [bakery].", ko: "서점에서 책을 사고 빵집에서 빵을 살 수 있어." },
                    { speaker: "B", text: "Let's walk on the [beach] after a haircut at the [beauty shop].", ko: "미용실에서 머리를 자른 뒤에 해변을 걷자." },
                    { speaker: "A", text: "Check out the [amusement park] and the [concert hall].", ko: "놀이공원과 연주회장도 확인해 봐." },
                    { speaker: "B", text: "Use the [crosswalk] to go to the [church] and then the [airport].", ko: "횡단보도를 이용해 교회에 갔다가 공항으로 가자." },
                    { speaker: "A", text: "Buy an apple at the [convenience store].", ko: "편의점에서 사과를 하나 사자." },
                    { speaker: "B", text: "I'm looking forward to our trip.", ko: "우리 여행이 정말 기대돼." },
                    { speaker: "A", text: "I went to the [department store] and the local [market].", ko: "나는 백화점과 지역 시장에 갔어." },
                    { speaker: "B", text: "Let's see the art at the [gallery] and the trees in the [park].", ko: "미술관에서 예술품을 보고 공원에서 나무들을 보자." },
                    { speaker: "A", text: "The [hospital] is next to the [fire station] and the [library].", ko: "병원은 소방서와 도서관 옆에 있어." },
                    { speaker: "B", text: "My dad works at the [factory] and has a [garden] at home.", ko: "우리 아빠는 공장에서 일하시고 집에 정원이 있어." },
                    { speaker: "A", text: "We can visit the [museum] or the apple [orchard].", ko: "우리는 박물관이나 사과 과수원을 방문할 수 있어." },
                    { speaker: "B", text: "Stop at the [gas station] before we head to the [harbor] or the [mudflat].", ko: "항구나 갯벌로 향하기 전에 주유소에 들르자." },
                    { speaker: "A", text: "The environment is so diverse here.", ko: "여기는 환경이 매우 다양하구나." },
                    { speaker: "A", text: "I'll park in the [parking lot] and go to the [post office].", ko: "주차장에 주차하고 우체국에 갈게." },
                    { speaker: "B", text: "Let's eat at the [restaurant] and then go to the [theater].", ko: "식당에서 밥을 먹고 극장에 가자." },
                    { speaker: "A", text: "I need to go to the [school] and then the [university].", ko: "나는 학교에 갔다가 대학교에 가야 해." },
                    { speaker: "B", text: "The [supermarket] and the [store] are near the [station].", ko: "슈퍼마켓과 가게는 역 근처에 있어." },
                    { speaker: "A", text: "Visit the animals at the [zoo] in our small [village].", ko: "우리 작은 마을에 있는 동물원에서 동물들을 구경하자." },
                    { speaker: "B", text: "Use the [rest room] at the [stadium] near the [police station].", ko: "경찰서 근처 경기장에 있는 화장실을 이용해." }
                ]
            },
            6: {
                intro: "주어진 뜻과 문맥을 보고, 빈칸에 알맞은 영어 단어를 적어 21줄의 대화문을 완성하세요.",
                dialogue: [
                    { speaker: "A", text: "The [driver] has a new [driver's license] for his [automobile].", ko: "그 운전사는 자기 자동차를 위한 새 운전면허증을 가지고 있어." },
                    { speaker: "B", text: "I saw an [ambulance] and a [fire engine] on the [highway].", ko: "나는 고속도로에서 구급차와 소방차를 봤어." },
                    { speaker: "A", text: "The [dump truck] is parked near the [crossing] and the [dock].", ko: "덤프트럭이 건널목과 부두 근처에 주차되어 있어." },
                    { speaker: "B", text: "He took a [flight] and then rode in a [helicopter].", ko: "그는 비행을 마친 뒤 헬리콥터를 탔어." },
                    { speaker: "A", text: "I want to travel on a huge [cruise ship] or a small [boat].", ko: "나는 거대한 유람선이나 작은 보트를 타고 여행하고 싶어." },
                    { speaker: "B", text: "I prefer riding my [bicycle] every day.", ko: "나는 매일 내 자전거를 타는 걸 더 좋아해." },
                    { speaker: "A", text: "Cycling is a great way to stay fit.", ko: "자전거 타기는 체력을 유지하는 좋은 방법이야." },
                    { speaker: "A", text: "The [passenger] on the [motorcycle] is on a [one-way street].", ko: "오토바이에 탄 승객이 일방통행로에 있어." },
                    { speaker: "B", text: "Wait at the [intersection] [opposite] the [railroad] tracks.", ko: "철로 반대편 교차로에서 기다려." },
                    { speaker: "A", text: "I saw a [patrol car] from the [overpass] above the [sidewalk].", ko: "인도 위의 육교에서 경찰차를 봤어." },
                    { speaker: "B", text: "The aircraft is on the [runway] near the large [ship].", ko: "항공기가 큰 배 근처의 활주로에 있어." },
                    { speaker: "A", text: "I like riding my [scooter] more than a [sailboat].", ko: "나는 범선보다 내 스쿠터를 타는 걸 좋아해." },
                    { speaker: "B", text: "Have you ever been in a [submarine] underwater?", ko: "물속 잠수함에 타본 적이 있니?" },
                    { speaker: "A", text: "Exploring the ocean depths would be amazing.", ko: "바다 깊은 곳을 탐험하는 건 정말 놀라울 거야." },
                    { speaker: "A", text: "The [traffic] is heavy near the red [traffic light].", ko: "빨간 신호등 근처에 교통이 혼잡해." },
                    { speaker: "B", text: "I'll take the [subway] or a [taxi] with my [ticket].", ko: "나는 티켓을 가지고 지하철이나 택시를 탈 거야." },
                    { speaker: "A", text: "The [train] and the [tram] are great public [transit] options.", ko: "기차와 전차는 훌륭한 대중교통 선택지야." },
                    { speaker: "B", text: "My [van] had a flat [tire] on its large [wheel].", ko: "내 승합차의 큰 바퀴 타이어가 펑크 났어." },
                    { speaker: "A", text: "A big [truck] and an old [wagon] passed by the [yacht].", ko: "큰 트럭과 낡은 마차가 요트 옆을 지나갔어." },
                    { speaker: "B", text: "Transport history is very interesting.", ko: "운송의 역사는 정말 흥미로워." },
                    { speaker: "A", text: "Technology keeps changing the way we move.", ko: "기술은 우리가 이동하는 방식을 계속 바꾸고 있어." }
                ]
            },
            7: {
                intro: "주어진 뜻과 문맥을 보고, 빈칸에 알맞은 영어 단어를 적어 21줄의 대화문을 완성하세요.",

            let trimmedPlacements = placements.map(p => ({
                ...p,
                r: p.r - minR,
                c: p.c - minC
            }));

            return { grid: trimmedGrid, placements: trimmedPlacements };

        function makeErrorEnglishSentenceText(item, chWords) {
            let originalEn = item.senEn;
            let targetEn = item.en;

            let bestFake = "";
            let maxScore = -999;

            for (let w of chWords) {
                if (w.en.toLowerCase() === targetEn.toLowerCase()) continue;

                let score = 0;
                if (w.en[0].toLowerCase() === targetEn[0].toLowerCase()) score += 5;
                if (w.en[w.en.length - 1].toLowerCase() === targetEn[targetEn.length - 1].toLowerCase()) score += 3;
                score -= Math.abs(w.en.length - targetEn.length);
                score += Math.random() * 2;

                if (score > maxScore) {
                    maxScore = score;
                    bestFake = w.en;
                }
            }

            let fakeEn = bestFake;
            let errorSen = originalEn;
            let answerText = "";

            let regex = new RegExp("\\b" + targetEn.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + "(s|es|d|ed|ing)?\\b", "i");
            let match = originalEn.match(regex);

            if (match) {
                errorSen = originalEn.replace(match[0], fakeEn);
                answerText = `${fakeEn} -> ${match[0]}`;
            } else {
                let base = targetEn.length > 4 ? targetEn.substring(0, 4) : targetEn;
                let regexBase = new RegExp("\\b" + base.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + "\\w*", "i");
                let matchBase = originalEn.match(regexBase);
                if (matchBase) {
                    errorSen = originalEn.replace(matchBase[0], fakeEn);
                    answerText = `${fakeEn} -> ${matchBase[0]}`;
                } else {
                    let words = originalEn.split(' ');
                    let maxIdx = words.length > 2 ? 2 : (words.length > 1 ? 1 : 0);
                    let originalWord = words[maxIdx].replace(/[.?!,]/g, '');
                    errorSen = originalEn.replace(originalWord, fakeEn);
                    answerText = `${fakeEn} -> ${originalWord}`;
                }
            }

            return { errorSen, answerText, correctKo: item.senKo };
        }

                    let target1Answer = getTenseAnswer(originSen, tenseInfo.target1); 
                    let target2Answer = getTenseAnswer(originSen, tenseInfo.target2); 
                    let ansT1Html = answerMode ? `<span class="text-red-600 font-bold text-[11pt] en-font w-full break-words leading-tight">${target1Answer}</span>` : ''; 
                    let ansT2Html = answerMode ? `<span class="text-red-600 font-bold text-[11pt] en-font w-full break-words leading-tight">${target2Answer}</span>` : '';
                    senTenseHtml += `
                        <div class="avoid-break mt-5 mb-6">
                            <div class="font-bold text-[11pt] text-gray-900 en-font mb-3"><span class="text-gray-400 mr-2 font-normal">Q${i + 1}.</span> ${originSen}</div>
                            <div class="ml-6 flex flex-col gap-3">
                                <div class="flex items-end gap-3 w-full">
                                    <span class="text-[9pt] bg-purple-700 text-white font-bold px-3 py-1 rounded en-font w-20 text-center shadow-sm mb-1">${tenseInfo.target1}</span>
                                    <div class="flex-1 writing-line w-full">${ansT1Html}</div>
                                </div>
                                <div class="flex items-end gap-3 w-full">
                                    <span class="text-[9pt] bg-purple-700 text-white font-bold px-3 py-1 rounded en-font w-20 text-center shadow-sm mb-1">${tenseInfo.target2}</span>
                                    <div class="flex-1 writing-line w-full">${ansT2Html}</div>
                                </div>
                            </div>
                        </div>`;

                    // Part 8. Error Correction
                    let err = sessionErrorData[i]; 
                    let ansErrHtml = answerMode ? `<span class="text-red-600 font-bold text-[11pt] en-font w-full break-words leading-tight">${err.answerText}</span>` : '';
                    errHtml += `
                        <div class="avoid-break mt-5 mb-6">
                            <p class="font-bold text-[12pt] text-gray-900 mb-3 en-font"><span class="text-red-600 mr-2">Q${i + 1}.</span> ${err.errorSen}</p>
                            <div class="ml-6 flex items-end gap-3 w-full">
                                <span class="text-[9pt] bg-red-600 text-white font-bold px-3 py-1 rounded shadow-sm ko-font tracking-tight mb-1 hidden sm:inline-block">Correction</span>
                                <div class="flex-1 writing-line w-full">${ansErrHtml}</div>
                            </div>
                        </div>`;
                }

                pageHtml += `
                    <div class="a4-page print-page-break">
                        ${headerHtml}
                        <div class="section-header">
                            <span class="section-number en-font">01</span>
                            <span class="section-title-text ko-font">Part 1. 단어 암기와 영작 (Word Practice)</span>
                        </div>
                        <div class="px-2">${wordTestHtml}</div>
                    </div>
                    <div class="a4-page print-page-break">
                        ${headerHtml}
                        <div class="section-header">
                            <span class="section-number en-font">02</span>
                            <span class="section-title-text ko-font">Part 2. 문장 해석과 영작 (Sentence Practice)</span>
                        </div>
                        <div class="px-2 mb-8">${senTestHtml}</div>
                        <div class="section-header">
                            <span class="section-number en-font">03</span>
                            <span class="section-title-text ko-font">Part 3. 단어 퍼즐 (Crossword)</span>
                        </div>
                        <div class="mt-4 flex justify-center scale-[0.9] origin-top">${renderCrosswordHtml(sessionCrossword, answerMode)}</div>
                    </div>
                    <div class="a4-page print-page-break">
                        ${headerHtml}
                        <div class="section-header">
                            <span class="section-number en-font">04</span>
                            <span class="section-title-text ko-font">Part 4. 단어 및 문장 배열 숙제 (Unscramble)</span>
                        </div>
                        <h3 class="font-bold text-gray-500 mt-4 mb-3 text-[11pt] border-l-[3px] border-gray-400 pl-3 en-font uppercase flex items-center bg-gray-50 p-1 w-max rounded-sm shadow-sm"><i class="fas fa-list-ul mr-2 text-[9pt]"></i> 01. Word Unscramble</h3>
                        <div class="px-3 mb-8">${wordScrHtml}</div>
                        <h3 class="font-bold text-gray-500 mt-6 mb-3 text-[11pt] border-l-[3px] border-gray-400 pl-3 en-font uppercase flex items-center bg-gray-50 p-1 w-max rounded-sm shadow-sm"><i class="fas fa-list-ol mr-2 text-[9pt]"></i> 02. Sentence Unscramble</h3>
                        <div class="px-3">${senUnscrHtml}</div>
                    </div>
                    <div class="a4-page print-page-break">
                        ${headerHtml}
                        <div class="section-header">
                            <span class="section-number en-font">05</span>
                            <span class="section-title-text ko-font">Part 5. 문장 변형 숙제 (Transformation)</span>
                        </div>
                        <div class="px-2 mb-8">${senTransHtml}</div>
                        <div class="section-header">
                            <span class="section-number en-font">06</span>
                            <span class="section-title-text ko-font">Part 6. 영영풀이 숙제 (Definition Match)</span>
                        </div>
                        <div class="px-2 mt-4">${defMatchHtml}</div>
                    </div>
                    <div class="a4-page print-page-break">
                        ${headerHtml}
                        <div class="section-header">
                            <span class="section-number en-font">07</span>
                            <span class="section-title-text ko-font">Part 7. 시제 변형 숙제 (Tense Change)</span>
                        </div>
                        <div class="px-2 mt-2 mb-8">${senTenseHtml}</div>
                        <div class="section-header">
                            <span class="section-number en-font">08</span>
                            <span class="section-title-text ko-font">Part 8. 오류 수정 숙제 (Error Correction)</span>
                        </div>
                        <div class="px-2 mt-2">${errHtml}</div>
                    </div>
                    <div class="a4-page print-page-break">
                        ${headerHtml}
                        <div class="section-header">
                            <span class="section-number en-font">09</span>
                            <span class="section-title-text ko-font">Part 9. 받아쓰기 숙제 (Dictation Practice)</span>
                        </div>
                        <div class="mt-4 mb-6 flex items-center justify-between bg-blue-50/50 p-5 rounded-lg border-[1.5px] border-blue-100 border-dashed">
                            <div>
                                <h4 class="text-xl font-black text-blue-900 en-font mb-1.5"><i class="fas fa-headphones-alt mr-2 text-blue-600"></i>QR Dictation Audio</h4>
                                <p class="text-gray-600 ko-font text-[10pt]">스마트폰으로 스캔하여 받아쓰기를 시작하세요.</p>
                            </div>
                            <div class="bg-white p-2 rounded shadow-sm border border-blue-200">
                                <img src="https://api.qrserver.com/v1/create-qr-code/?size=90x90&data=https%3A%2F%2Fjunior-dictation.jiwanism.workers.dev%2F" alt="QR" class="w-16 h-16">
                            </div>
                        </div>
                        <div class="grid grid-cols-1 gap-6 px-3">

                                <div class="avoid-break w-full">
                                    <div class="flex items-end gap-4 w-full">
                                        <span class="font-black text-[14pt] text-blue-800 en-font w-8 mb-1">Q${String(i + 1).padStart(2, '0')}</span>
                                        <div class="flex-1 writing-line w-full">
                                            ${answerMode && sessionWords[i] ? `<span class="text-red-600 font-bold text-[11pt] en-font w-full break-words">${sessionWords[i].senEn}</span>` : ''}
                                        </div>
                                    </div>
                                </div>`).join('')}
                        </div>
                    </div>`;
            }
            return pageHtml;
        }

        function renderChapter(id) {
            document.querySelectorAll('.chapter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${id}`).classList.add('active');
            const ch = db.find(c => c.id === id);
            updateDocumentTitle(ch);
            document.getElementById('page-container').innerHTML = generatePageHtml(id, currentSession, currentView, isAnswerMode);
        }

        function printChapterAll() {
            const activeBtn = document.querySelector('.chapter-btn.active');
            if (!activeBtn) { alert("먼저 챕터를 선택해주세요."); return; }
            const chId = parseInt(activeBtn.id.replace('btn-', ''));
            let allHtml = "";
            for (let s = 1; s <= 3; s++) {
                allHtml += generatePageHtml(chId, s, 'vocalist', isAnswerMode);
                allHtml += generatePageHtml(chId, s, 'textbook', isAnswerMode);
                allHtml += generatePageHtml(chId, s, 'hw' + s, isAnswerMode);
            }
            const originalContent = document.getElementById('page-container').innerHTML;
            document.getElementById('page-container').innerHTML = allHtml.trim();
            setTimeout(() => {
                window.print();
                document.getElementById('page-container').innerHTML = originalContent;
            }, 500);
        }

        function setupLogoUploader() {
            document.getElementById('logo-upload').addEventListener('change', function (e) {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function (e) {
                    currentLogoUrl = e.target.result;
                    const activeBtn = document.querySelector('.chapter-btn.active');
                    if (activeBtn) {
                        const chId = parseInt(activeBtn.id.replace('btn-', ''));
                        renderChapter(chId);
                    }
                };
                reader.readAsDataURL(file);
                e.target.value = '';
            });
        }

        function setupCsvUploader() {
            document.getElementById('csv-upload').addEventListener('change', function (e) {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function (e) {
                    const text = e.target.result;
                    const parsedWords = parseCSV(text);

                    if (parsedWords.length > 0) {
                        const activeBtn = document.querySelector('.chapter-btn.active');
                        const chId = parseInt(activeBtn.id.replace('btn-', ''));
                        const ch = db.find(c => c.id === chId);

                        ch.words = parsedWords;
                        ch.cached = false;
                        renderChapter(chId);
                        alert(`성공적으로 ${parsedWords.length}개의 단어와 문장을 불러왔습니다!`);
                    } else {
                        alert("CSV 파일에서 데이터를 찾을 수 없거나 형식이 맞지 않습니다.");
                    }
                };
                reader.readAsText(file);
                e.target.value = '';
            });
        }

        function parseCSV(text) {
            const rows = text.split('\n');
            const result = [];
            const re = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;

            for (let i = 0; i < rows.length; i++) {
                if (!rows[i].trim()) continue;

                const cols = rows[i].split(re).map(x => x.replace(/^"|"$/g, '').trim());

                if (cols[0] && !isNaN(parseInt(cols[0]))) {
                    if (cols.length >= 5) {
                        result.push({
                            en: cols[1],
                            def: cols[2],
                            senEn: cols[3],
                            senKo: cols[4]
                        });
                    }
                }
            }
            return result;
        }

        init();
    </script>
